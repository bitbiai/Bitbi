name: Memvid Stream Preview Processor

on:
  workflow_dispatch:
    inputs:
      job_limit:
        description: Jobs to claim per processor pass
        required: false
        default: "4"
      max_runs:
        description: Number of processor passes to run
        required: false
        default: "1"
      repair_downloads:
        description: Repair ready previews missing Cloudflare MP4 download URLs
        required: false
        default: "true"

permissions:
  contents: read

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version
          ffprobe -version

      - name: Run Memvid Stream preview processor
        env:
          AUTH_WORKER_BASE_URL: ${{ vars.AUTH_WORKER_BASE_URL || 'https://bitbi.ai' }}
          HOMEPAGE_HERO_EXTERNAL_FFMPEG_SECRET: ${{ secrets.MEMVID_STREAM_PREVIEW_PROCESSOR_SECRET }}
          MEMVID_STREAM_PREVIEW_PROCESSOR_SECRET: ${{ secrets.MEMVID_STREAM_PREVIEW_PROCESSOR_SECRET }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.STREAM_ACCOUNT_ID }}
          STREAM_ACCOUNT_ID: ${{ secrets.STREAM_ACCOUNT_ID }}
          CLOUDFLARE_STREAM_API_TOKEN: ${{ secrets.CLOUDFLARE_STREAM_API_TOKEN || secrets.STREAM_API_TOKEN }}
          STREAM_API_TOKEN: ${{ secrets.STREAM_API_TOKEN }}
          PROCESS_HOMEPAGE_HERO: "0"
          PROCESS_HOMEPAGE_SOURCE_POSTERS: "0"
          PROCESS_MEMVID_STREAM_PREVIEWS: "1"
          REPAIR_MEMVID_STREAM_DOWNLOADS: ${{ inputs.repair_downloads }}
          JOB_LIMIT: ${{ inputs.job_limit }}
          STREAM_DOWNLOAD_POLL_INTERVAL_MS: ${{ vars.STREAM_DOWNLOAD_POLL_INTERVAL_MS || '5000' }}
          STREAM_DOWNLOAD_MAX_WAIT_MS: ${{ vars.STREAM_DOWNLOAD_MAX_WAIT_MS || '300000' }}
        run: |
          runs="${{ inputs.max_runs }}"
          if ! [[ "$runs" =~ ^[0-9]+$ ]]; then
            runs=1
          fi
          if [ "$runs" -lt 1 ]; then
            runs=1
          fi
          if [ "$runs" -gt 5 ]; then
            runs=5
          fi
          for run in $(seq 1 "$runs"); do
            echo "Memvid Stream preview processor pass $run of $runs"
            node services/homepage-ffmpeg-processor/processor.mjs
          done
