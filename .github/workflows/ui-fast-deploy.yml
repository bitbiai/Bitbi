# Fast path for direct-main homepage/UI-only updates.
#
# This workflow intentionally keeps a narrow changed-file allowlist and fails
# closed for anything outside it. It is meant for low-risk static homepage
# polish, not backend, auth, billing, Worker, package, release, config, or
# workflow changes. Risky or mixed changes should use the full
# ".github/workflows/static.yml" Pages workflow.
#
# UI-only means every changed file is one of:
# - index.html or de/index.html
# - homepage CSS/static component CSS listed below
# - homepage JS under js/pages/index/**
# - local images/favicons/fonts
# - tests/smoke.spec.js
#
# The push paths filter starts this workflow only for likely UI commits. The
# internal guard still compares all changed files because a mixed commit can
# include both an allowed UI file and a risky file. Mixed/risky changes fail
# before validation, before the Pages environment, and before Pages concurrency.
#
# Operator policy:
# - Normal UI work should use normal commits and `git push origin main`.
# - Avoid `git commit --amend` / force-push for routine UI deploys; if a push
#   base disappears, the guard will fall back to HEAD^ only when that is safe.
# - Manual workflow dispatch can intentionally redeploy current HEAD with
#   `allow_empty_deploy=true`.
# - For manual changed-file checks, provide a known previous commit SHA in
#   `base_ref`.

name: Fast UI Deploy to Pages

on:
  push:
    branches: ["main"]
    paths:
      - "index.html"
      - "de/index.html"
      - "css/pages/index.css"
      - "css/base/**"
      - "css/components/**"
      - "js/pages/index/**"
      - "assets/images/**"
      - "assets/favicons/**"
      - "fonts/**"
      - "tests/smoke.spec.js"
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Optional base ref/SHA for changed-file guard. Defaults to HEAD^."
        required: false
        default: ""
      allow_empty_deploy:
        description: "Allow an intentional manual redeploy when no changed files are found."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  guard:
    name: Classify changed files
    runs-on: ubuntu-latest
    outputs:
      ui_only: ${{ steps.changed-files.outputs.ui_only }}
      base_ref: ${{ steps.changed-files.outputs.base_ref }}
      head_ref: ${{ steps.changed-files.outputs.head_ref }}
      empty_deploy: ${{ steps.changed-files.outputs.empty_deploy }}
    steps:
      - name: Checkout full history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Guard changed files are UI-only
        id: changed-files
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BASE: ${{ github.event.before }}
          PUSH_HEAD: ${{ github.sha }}
          MANUAL_BASE: ${{ github.event.inputs.base_ref }}
          ALLOW_EMPTY_DEPLOY: ${{ github.event.inputs.allow_empty_deploy || 'false' }}
        run: |
          set -euo pipefail

          is_truthy() {
            case "${1:-}" in
              true|TRUE|True|1|yes|YES|Yes) return 0 ;;
              *) return 1 ;;
            esac
          }

          is_zero_sha() {
            [ -z "${1:-}" ] || echo "$1" | grep -Eq '^0+$'
          }

          is_valid_commit() {
            [ -n "${1:-}" ] && git cat-file -e "$1^{commit}" 2>/dev/null
          }

          fail_friendly() {
            echo "::error::$1"
            echo "$1"
            exit 1
          }

          FALLBACK_USED="false"
          EMPTY_DEPLOY="false"
          ALLOW_EMPTY="false"
          if is_truthy "$ALLOW_EMPTY_DEPLOY"; then
            ALLOW_EMPTY="true"
          fi

          HEAD_REF="$PUSH_HEAD"
          if ! is_valid_commit "$HEAD_REF"; then
            fail_friendly "Fast UI deploy cannot validate head ref '$HEAD_REF'. Re-run after checkout has full history or use the full static workflow."
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -n "${MANUAL_BASE:-}" ]; then
              BASE_REF="$MANUAL_BASE"
              if ! is_valid_commit "$BASE_REF"; then
                fail_friendly "Manual Fast UI deploy base_ref '$BASE_REF' is not a valid commit in this checkout. Provide a known previous commit SHA or rerun with allow_empty_deploy=true only for an intentional current-HEAD redeploy."
              fi
            elif is_valid_commit "HEAD^"; then
              BASE_REF="HEAD^"
            elif [ "$ALLOW_EMPTY" = "true" ]; then
              BASE_REF="$HEAD_REF"
              EMPTY_DEPLOY="true"
            else
              fail_friendly "Manual Fast UI deploy could not find a valid default base (HEAD^). Provide base_ref, or rerun with allow_empty_deploy=true to intentionally redeploy current HEAD."
            fi
          else
            BASE_REF="$PUSH_BASE"
            if is_zero_sha "$BASE_REF" || ! is_valid_commit "$BASE_REF"; then
              echo "::warning::Push base '$BASE_REF' is unavailable in this checkout. This can happen after amend/force-push. Falling back to HEAD^ if it is valid."
              if is_valid_commit "HEAD^"; then
                BASE_REF="HEAD^"
                FALLBACK_USED="true"
              else
                fail_friendly "Fast UI deploy cannot resolve push base '$PUSH_BASE' and HEAD^ is not available. Push a normal UI-only commit, provide a manual base_ref through workflow_dispatch, or use the full static workflow."
              fi
            fi
          fi

          if ! is_valid_commit "$BASE_REF"; then
            fail_friendly "Fast UI deploy selected base ref '$BASE_REF', but it is not a valid commit. Provide a known previous commit SHA or use the full static workflow."
          fi

          echo "Changed-file guard"
          echo "- Event:                  $EVENT_NAME"
          echo "- Selected base ref:      $BASE_REF"
          echo "- Head ref:               $HEAD_REF"
          echo "- Fallback used:          $FALLBACK_USED"
          echo "- Allow empty deploy:     $ALLOW_EMPTY"
          echo "- Intentional empty run:  $EMPTY_DEPLOY"
          echo

          mapfile -t changed_files < <(git diff --name-only --no-renames "$BASE_REF" "$HEAD_REF" | sort)

          echo "Changed files (${#changed_files[@]}):"
          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "- none"
          else
            printf -- '- %s\n' "${changed_files[@]}"
          fi
          echo

          if [ "${#changed_files[@]}" -eq 0 ]; then
            if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$ALLOW_EMPTY" = "true" ]; then
              EMPTY_DEPLOY="true"
              echo "No changed files were found. Continuing because this is an intentional manual empty redeploy."
            else
              fail_friendly "No changed files were found. For workflow_dispatch, provide base_ref or rerun with allow_empty_deploy=true for an intentional current-HEAD redeploy. Push events must contain a UI-only diff."
            fi
          fi
          echo "- Intentional empty run after diff: $EMPTY_DEPLOY"
          echo

          is_ui_safe_path() {
            case "$1" in
              index.html) return 0 ;;
              de/index.html) return 0 ;;
              css/pages/index.css) return 0 ;;
              css/base/*) return 0 ;;
              css/components/*) return 0 ;;
              js/pages/index/*) return 0 ;;
              assets/images/*) return 0 ;;
              assets/favicons/*) return 0 ;;
              fonts/*) return 0 ;;
              tests/smoke.spec.js) return 0 ;;
              *) return 1 ;;
            esac
          }

          blocked=()
          for file in "${changed_files[@]}"; do
            if ! is_ui_safe_path "$file"; then
              blocked+=("$file")
            fi
          done

          if [ "${#blocked[@]}" -gt 0 ]; then
            echo "Fast UI deploy blocked. These files are outside the UI-only allowlist:"
            printf -- '- %s\n' "${blocked[@]}"
            echo
            echo "Examples of paths intentionally blocked from this fast path:"
            echo "- workers/**, admin/**, account/**"
            echo "- js/shared/auth*, js/shared/wallet/**, js/pages/admin/**"
            echo "- package.json, package-lock.json, config/**, scripts/**"
            echo "- migrations/**, .github/workflows/**, _worker.js"
            echo "- billing/auth/provider/security/backend-related files"
            echo
            echo "Use the full static workflow for risky or mixed changes, or split the direct-main push into a UI-only change."
            exit 1
          fi

          echo "All changed files are UI-only. Continuing with fast validation and Pages deploy."
          printf 'ui_only=true\n' >> "$GITHUB_OUTPUT"
          printf 'base_ref=%s\n' "$BASE_REF" >> "$GITHUB_OUTPUT"
          printf 'head_ref=%s\n' "$HEAD_REF" >> "$GITHUB_OUTPUT"
          printf 'empty_deploy=%s\n' "$EMPTY_DEPLOY" >> "$GITHUB_OUTPUT"

  deploy:
    name: Validate and deploy UI-only change
    needs: guard
    if: needs.guard.outputs.ui_only == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    # Keep the shared production Pages lock only on the actual deploy job.
    # The guard job must never block the full workflow's Pages deploy queue.
    concurrency:
      group: "pages"
      cancel-in-progress: false
    env:
      FAST_UI_BASE_REF: ${{ needs.guard.outputs.base_ref }}
      FAST_UI_HEAD_REF: ${{ needs.guard.outputs.head_ref }}
    steps:
      - name: Checkout full history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: npm run check:js

      - name: Check committed secrets
        run: npm run check:secrets

      - name: Check DOM sink baseline
        run: npm run check:dom-sinks

      - name: Check auth route policy coverage
        run: npm run check:route-policies

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run focused homepage smoke tests
        run: npx playwright test tests/smoke.spec.js -g "Homepage|MODELS|hero section renders|Static assets" --project=chromium

      - name: Build static site
        run: npm run build:static

      - name: Check diff whitespace
        run: git diff --check "$FAST_UI_BASE_REF" "$FAST_UI_HEAD_REF"

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
